<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Metal</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
}

canvas {
    display: block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// BLOBS (metaball-style)
const blobs = [];

for (let i = 0; i < 6; i++) {
    blobs.push({
        x: Math.random() * w,
        y: Math.random() * h,
        vx: (Math.random() - 0.5) * 0.6,
        vy: (Math.random() - 0.5) * 0.6,
        base: 120 + Math.random() * 60,
        pulse: Math.random() * 1000
    });
}

function draw() {
    const image = ctx.createImageData(w, h);
    const data = image.data;

    let t = performance.now() * 0.002;

    // update blobs
    blobs.forEach(b => {
        b.x += b.vx;
        b.y += b.vy;

        if (b.x < 0 || b.x > w) b.vx *= -1;
        if (b.y < 0 || b.y > h) b.vy *= -1;
    });

    // metaball field
    for (let y = 0; y < h; y += 2) {
        for (let x = 0; x < w; x += 2) {

            let sum = 0;

            blobs.forEach(b => {
                let dx = x - b.x;
                let dy = y - b.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                let radius = b.base + Math.sin(t + b.pulse) * 20;
                sum += (radius * radius) / (dist * dist + 1);
            });

            let index = (y * w + x) * 4;

            if (sum > 1.2) {
                // neon liquid coloring
                let hue = (sum * 40 + t * 100) % 360;

                let r = Math.sin(hue * 0.02) * 127 + 128;
                let g = Math.sin(hue * 0.02 + 2) * 127 + 128;
                let b = Math.sin(hue * 0.02 + 4) * 127 + 128;

                data[index] = r;
                data[index + 1] = g;
                data[index + 2] = b;
                data[index + 3] = 255;
            } else {
                data[index + 3] = 255;
            }
        }
    }

    ctx.putImageData(image, 0, 0);

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
